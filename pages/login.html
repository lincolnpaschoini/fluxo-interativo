<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Jornada do Cliente · Paschoini</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f3f5;
      color: #1a1a1a;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.10);
      padding: 52px 52px 44px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 36px;
    }

    .logo-wrap img {
      width: 240px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #b0b0b0;
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    .system-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a8a8a;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    p.sub {
      font-size: 13.5px;
      color: #6b6b66;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .btn-microsoft {
      width: 100%;
      padding: 14px 20px;
      background: #fff;
      color: #1a1a1a;
      border: 1.5px solid #d0d0cc;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .btn-microsoft:hover {
      background: #f5f5f5;
      border-color: #b0b0b0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .note {
      margin-top: 24px;
      font-size: 12px;
      color: #b0b0aa;
      line-height: 1.6;
    }
  </style>
</head>
